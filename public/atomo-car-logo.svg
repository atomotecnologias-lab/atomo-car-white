<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Atomo Car">
  <rect width="100" height="100" rx="20" fill="#0d1510"/>
  <!-- Atom nucleus -->
  <circle cx="50" cy="50" r="7" fill="#22c55e"/>
  <!-- Orbital ring 1 -->
  <ellipse cx="50" cy="50" rx="40" ry="14" fill="none" stroke="#22c55e" stroke-width="2.8"/>
  <!-- Orbital ring 2 (rotated 60°) -->
  <ellipse cx="50" cy="50" rx="40" ry="14" fill="none" stroke="#22c55e" stroke-width="2.8" transform="rotate(60 50 50)"/>
  <!-- Orbital ring 3 (rotated 120°) -->
  <ellipse cx="50" cy="50" rx="40" ry="14" fill="none" stroke="#22c55e" stroke-width="2.8" transform="rotate(120 50 50)"/>
</svg>
